<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Proyecto Pesquería V4 Profesional</title>
  <meta name="description" content="Dashboard profesional modular para GENERAL y BACKLOG PT." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">CP</div>
        <div><h1>Control Proyecto</h1><p>Pesquería · V4 Profesional</p></div>
      </div>
      <nav class="nav">
        <div class="nav-title">Módulos</div>
        <button class="nav-link active" data-module="general"><i data-lucide="layout-dashboard"></i><span>GENERAL</span></button>
        <button class="nav-link" data-module="backlog"><i data-lucide="bar-chart-3"></i><span>BACKLOG PT</span></button>
        <div class="nav-title">Acciones</div>
        <button class="nav-link" id="refreshBtn"><i data-lucide="refresh-cw"></i><span>Actualizar</span></button>
      </nav>
      <div class="sidebar-footer"><strong>V4 Profesional</strong><span>Vercel + Apps Script</span></div>
    </aside>
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <main class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Abrir menú"><i data-lucide="menu"></i></button>
        <div class="topbar-title"><h2 id="moduleTitle">GENERAL</h2><p id="moduleSubtitle">Cargando datos...</p></div>
        <div class="topbar-status"><span class="pill" id="loadPill">Inicializando</span></div>
      </header>
      <section class="filters-card">
        <div class="filters-head">
          <div><h3 id="filtersTitle">Filtros</h3><p id="filtersSubtitle">Filtros independientes por módulo</p></div>
          <button class="secondary-btn" id="clearFiltersBtn"><i data-lucide="eraser"></i>Limpiar filtros</button>
        </div>
        <div class="filters-grid" id="filtersGrid"></div>
      </section>
      <section class="progress-card" id="progressCard">
        <div class="progress-info"><span id="progressText">Preparando carga...</span><span id="progressPct">0%</span></div>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </section>
      <section class="kpi-grid" id="kpiGrid"></section>
      <section class="content-grid" id="chartsGrid"></section>
      <section class="table-card">
        <div class="card-head">
          <div><h3 id="tableTitle">Tabla detallada</h3><p id="tableSubtitle">Primeros 500 registros visibles</p></div>
          <span class="badge" id="tableCount">0 registros</span>
        </div>
        <div class="table-wrap">
          <table class="data-table"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/normalizer.js"></script>
  <script src="./js/charts.js"></script>
  <script src="./js/modules.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
